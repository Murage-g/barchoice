# File: alembic.ini

[alembic]
# Path to migration scripts
script_location = %(here)s/alembic

# Prepend current project directory to sys.path
prepend_sys_path = .

# Path separator for multiple paths (uses OS default)
path_separator = os

# Optional timezone for migration timestamps
# timezone = UTC

# Max slug length (optional)
# truncate_slug_length = 40

# Run environment during revision
revision_environment = false

# Allow .pyc files without source
sourceless = false

# Version locations (default: versions folder)
# version_locations = %(here)s/alembic/versions

# Recursively search version_locations (new in Alembic 1.10)
recursive_version_locations = false

# Output encoding for generated revision files
output_encoding = utf-8

# Post-write hooks (auto-format migrations with black)
; [post_write_hooks]
; hooks = black
; black.type = console_scripts
; black.entrypoint = black
; black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S